name: CI
on:
  push:
    branches: ["*"]        
  pull_request:
    branches: [main]       
jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"               

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test                      

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start server & check it responds
        run: |
          npm start &               # Start in background
          sleep 3                   # Wait for it to boot
          curl --fail http://localhost:3000/
          echo "✅ Server is responding!"
