# ============================================================
# CD Workflow — Deploys when code is merged to main
# This is the "Continuous Deployment" part of CI/CD
# ============================================================
name: CD

on:
  push:
    branches: [main]       # Only deploy from the main branch

jobs:
  # ----------------------------------------------------------
  # JOB 1: Re-run tests before deploying (safety check)
  # ----------------------------------------------------------
  test-before-deploy:
    name: Verify Tests Pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ----------------------------------------------------------
  # JOB 2: Simulate a deployment
  # In a real app, replace the "echo" steps with actual
  # deployment commands (e.g., deploy to Render, Railway,
  # AWS, Heroku, etc.)
  # ----------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test-before-deploy        # Only deploy if tests pass!
    environment: production          # Requires manual approval (optional)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install production dependencies only
        run: npm ci --omit=dev

      # -------------------------------------------------------
      # EXAMPLE: Deploy to Railway
      # Uncomment and add RAILWAY_TOKEN to your repo secrets
      # -------------------------------------------------------
      # - name: Deploy to Railway
      #   run: npx railway up
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # -------------------------------------------------------
      # EXAMPLE: Deploy to Render (via deploy hook)
      # -------------------------------------------------------
      # - name: Trigger Render Deploy
      #   run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # Simulated deploy step — replace with your real platform!
      - name: Deploy (simulated)
        run: |
          echo "🚀 Deploying version $(node -e "console.log(require('./package.json').version)") to production..."
          echo "✅ Deploy complete!"

      # Notify your team the deploy succeeded
      - name: Post-deploy notification
        run: |
          echo "📣 Deployed successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
