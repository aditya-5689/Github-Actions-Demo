# ============================================================
# CI Workflow — Runs on every push & pull request
# This is the "Continuous Integration" part of CI/CD
# ============================================================
name: CI

on:
  push:
    branches: ["*"]        # Trigger on push to ANY branch
  pull_request:
    branches: [main]       # Trigger on PRs targeting main

jobs:
  # ----------------------------------------------------------
  # JOB 1: Run tests across multiple Node.js versions
  # This ensures your code works on different environments
  # ----------------------------------------------------------
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]   # Test on 3 Node versions in parallel!

    steps:
      # Step 1: Check out your code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the Node.js version from the matrix
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"               # Cache node_modules for speed

      # Step 3: Install dependencies (uses package-lock.json)
      - name: Install dependencies
        run: npm ci

      # Step 4: Run linter
      - name: Lint
        run: npm run lint

      # Step 5: Run tests (exits with code 1 if any test fails)
      - name: Run tests
        run: npm test

  # ----------------------------------------------------------
  # JOB 2: Check the app actually starts up without crashing
  # ----------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test                      # Only run if tests pass!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start server & check it responds
        run: |
          npm start &               # Start in background
          sleep 3                   # Wait for it to boot
          curl --fail http://localhost:3000/
          echo "✅ Server is responding!"
